<!DOCTYPE html>
<html lang="en">

<head>
    <!-- شرح تفصيلي: هذه الإعدادات الأساسية للصفحة حتى تعمل بشكل سليم على جميع الأجهزة. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShineHub Car Wash - Login & Register</title>
    <meta name="description" content="Login and registration page for ShineHub Car Wash." />

    <!-- شرح تفصيلي: نحن نستخدم نفس ملف التصميم القديم بدون أي تغيير في الألوان أو الشكل. -->
    <link rel="stylesheet" href="frontend/Stayl/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="site-shell">
        <header class="header">
            <div class="container nav-bar">
                <!-- شرح تفصيلي: الشعار يرجع المستخدم دائماً إلى الصفحة الرئيسية index.html. -->
                <a href="index.html" class="brand">
                    <span class="brand-mark">S</span>
                    <div>
                        <strong>ShineHub</strong>
                        <small>Car Wash & Detailing</small>
                    </div>
                </a>

                <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <!-- شرح تفصيلي: الروابط تم تبسيطها حتى لا يوجد أي انتقال إلى home.html أو auth.html. -->
                <nav class="nav" id="mainNav">
                    <a href="index.html#home">Home</a>
                    <a href="index.html#services">Services</a>
                    <a href="index.html#booking">Booking</a>
                    <a href="auth_login.html">Login</a>
                </nav>

                <div class="header-actions">
                    <a href="index.html#booking" class="btn btn-primary">Book Now</a>
                </div>
            </div>
        </header>

        <section class="section alt-section-auth" id="auth">
            <div class="container auth-grid">
                <div class="section-heading-auth left">
                    <span class="eyebrow">Account Access</span>
                    <h2>Manage your bookings</h2>
                    <p>Log in or create a new account to keep track of your car wash history and book services faster.</p>
                </div>

                <div class="auth-card">
                    <!-- شرح تفصيلي: عند الضغط على Login أو Register نحن فقط نظهر الفورم المناسب في نفس الصفحة. -->
                    <div class="tabs">
                        <button type="button" class="tab-btn active" data-tab="login">Login</button>
                        <button type="button" class="tab-btn" data-tab="register">Register</button>
                    </div>

                    <!-- شرح تفصيلي: هذا فورم تسجيل الدخول. البيانات تذهب إلى process_login.php ثم يرجع المستخدم إلى index.html عند النجاح. -->
                    <form id="loginForm" class="auth-form active" action="backend/process_login.php" method="POST">
                        <label>
                            <span>Email</span>
                            <input type="email" name="email" required placeholder="Enter your email" />
                        </label>
                        <label>
                            <span>Password</span>
                            <input type="password" name="password" required placeholder="Enter your password" />
                        </label>
                        <button type="submit" class="btn btn-primary btn-block">Login</button>
                    </form>

                    <!-- شرح تفصيلي: هذا فورم إنشاء الحساب. بعد نجاح التسجيل نرجع لنفس الصفحة ليقوم المستخدم بتسجيل الدخول. -->
                    <form id="registerForm" class="auth-form" action="backend/process_register.php" method="POST">
                        <label>
                            <span>Full Name</span>
                            <input type="text" name="full_name" required placeholder="Enter your full name" />
                        </label>
                        <label>
                            <span>Email Address</span>
                            <input type="email" name="email" required placeholder="Enter your email" />
                        </label>
                        <label>
                            <span>Phone Number</span>
                            <input type="tel" name="phone" required placeholder="Enter your phone number" />
                        </label>
                        <label>
                            <span>Password</span>
                            <input type="password" name="password" required minlength="6" placeholder="Enter your password" />
                        </label>
                        <label>
                            <span>Confirm Password</span>
                            <input type="password" name="confirm_password" required minlength="6" placeholder="Re-enter your password" />
                        </label>
                        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                    </form>
                </div>
            </div>
        </section>

        <footer class="footer">
            <div class="container footer-content">
                <p>© <span id="currentYear"></span> ShineHub. <span>All rights reserved. Clean cars, happy customers.</span></p>
            </div>
        </footer>

        <div class="toast" id="toast"></div>
    </div>

    <!-- شرح تفصيلي: نفس ملف الجافاسكربت هنا أيضاً لأنه مسؤول عن التبويبات ورسائل النجاح والخطأ. -->
    <script src="frontend/Script/Script.js"></script>
</body>

</html>
